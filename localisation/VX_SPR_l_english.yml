 ### COUNTRY IDEAS ###
 SPR_strained_economy:0 "Ruined Economy"
 SPR_strained_economy_desc:0 "Following the aftershocks of the Great Depression and a failed land reform, Spain's economy has hit a wall; factories have stalled, mines are abandonned and fields are left to the mercy of the wind. Something needs to be done if Spain's economy is to recover."

 SPR_military_plot:0 "A Miltary Plot?"
 SPR_military_plot_desc:0 "The failed "Sanjurjada" military coup attempt in 1932 still casts its shadow over the Spanish military to this day. In the aftermath, various disloyal military commanders, among them the coup's leader José Sanjurjo, fled to exile in Portugal and continue their plotting even now.\n\nEven this failure has not discouraged disloyal officers, however, as even within Spain itself many desire to see a return to a Monarchy or even a strong Fascist dictatorship. Too strong meddling by the government in the internal affairs of the military may well spark yet another uprising; far more violent and bloody than the last. "

 SPR_republican_collapse:0 "Republican Collapse"
 SPR_republican_collapse_desc:0 "Following the Republican split between the various conservative and liberal factions, the current government - whose popularity only seems to plummet - is now more paralysed than ever."

 ### DYNAMIC MODIFIERS ###

 SPR_worker_opposition_dynmod:0 "Workers' Opposition"
 SPR_worker_opposition_dynmod_desc:0 "§lThis modifier will scale with the popularity of Socialist parties in our country§!\n\n The country finds itself seemingly in the grips of the starting stages of a workers' revolution; strike upon strike paralyze the industry and daily life as workers demand less work and more pay, and poor tenant farmers increasingly appropriate farmland while the government turns a blind eye."

 SPR_rising_falange_dynmod:0 "Reactionary Opposition"
 SPR_rising_falange_dynmod_desc:0 "§lThis modifier will scale with the popularity of Autocratic and Fascist parties in our country§!\n\nDiametrically opposed to the very idea of a Spanish republic, reactionary movements - supported by the Catholic church, military members and Carlist sympathisers - have increasingly hampered any efforts to stabilise the political situation. With the republican government finding itself unable to confront these movements head on Spain may very well descend into full on reactionary uprisings."