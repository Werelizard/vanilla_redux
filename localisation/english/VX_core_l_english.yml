 ### SUB IDEOLOGIES ###
 authoritarian_socialism_ideology_subtype:0 "Authoritarian Socialist"
 authoritarian_socialism_ideology_subtype_desc:0 "Authoritarian socialism, also known as Totalitarian Socialism or Socialism from Above or Communism, is a left-leaning ideology embracing a socialist economic model whilst also rejecting political pluralism and freedom of expression. States embracing authoritarian socialism view the state as the preserver of socialist ideals and the ultimate defender of the revolution."

 revolutionary_socialism_ideology_subtype:0 "Revolutionary Socialist"
 revolutionary_socialism_ideology_subtype_desc:0 "Revolutionary socialism, also known as Socialism from Below, Libertarian Socialism or Communism is a form of government embracing a socialist economic system, the rejection of the power of the state, pursuing decentralisation and empowerment of workers."

 anarcho_communism_ideology_subtype:0 "Revolutionary Socialist"
 anarcho_communism_ideology_subtype_desc:0 "Revolutionary socialism, also known as Socialism from Below, Libertarian Socialism or Communism is a form of government embracing a socialist economic system, the rejection of the power of the state, pursuing decentralisation and empowerment of workers."

 social_democracy_ideology_subtype:0 "Social Democratic"
 social_democracy_ideology_subtype_desc:0 "Striving for equality and a socialist state by reformist means, democratic socialism aims to abolish or mitigate the effects of capitalism with public mandate."

 progressive_ideology_subtype:0 "Progressive"
 progressive_ideology_subtype_desc:0 "Progressivism is an ideology pushing for reform, social equality and a fairer economic system whilst upholding individuals' rights and working within the democratic system."

 liberal_ideology_subtype:0 "Liberal"
 liberal_ideology_subtype_desc:0 "With a long philosophical tradition of valuing personal liberty, liberalism views safeguarding these rights as the primary function of the state."

 anarcho_liberalism_ideology_subtype:0 "Anarcho-Liberalism"
 anarcho_liberalism_ideology_subtype_desc:0 "With a long philosophical tradition of valuing personal liberty, liberalism views safeguarding these rights as the primary function of the state."

 conservatism_ideology_subtype:0 "Conservative"
 conservatism_ideology_subtype_desc:0 "Considering rapid changes to society to be potentially harmful, conservatism espouses tradition and moderate reforms, sometimes advocating a return to old moral values."

 authoritarian_democrat_ideology_subtype:0 "Authoritarian Democratic"
 authoritarian_democrat_ideology_subtype_desc:0 "Authoritarian democracy, also known as managed democracy or guided democracy, designates a system of government with a strong executive and a weak or non-existing political representation. Pluralism is either absent or heavily controlled and personal freedoms are usually curtailed."

 autocracy_ideology_subtype:0 "Autocratic"
 autocracy_ideolog_subtypey_desc:0 "Autocracy is a form of government where the political power is concentrated in the hands of a single individual. Political representation is non-existent, and individual rights are absent or otherwise severely curtailed."

 absolute_monarchy_ideology_subtype:0 "Absolute Monarchy"
 absolute_monarchy_ideology_subtype_desc:0 "Autocracy is a form of government where the political power is concentrated in the hands of a single individual. Political representation is non-existent, and individual rights are absent or otherwise severely curtailed."

 fascist_ideology_subtype:0 "Fascist"
 fascist_ideology_subtype_desc:0 "Fascism is a far-right authoritarian ideology espousing corporatism, totalitarianism, revolutionary nationalism, and militarism. It is both fiercely anti-democratic and anti-socialist - refuting both liberty and equality in kind."
 
