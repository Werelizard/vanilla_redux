 ### DECISION CATEGORIES ###
 VX_spanish_republic_category:0 "A Faltering Republic"
 VX_spanish_republic_category_desc:0 "The young Spanish Republic tethers over the abyss, driven towards its seemingly inevitable collapse by both ends of the political spectrum; ever since the deposition of Alfonso XIII it has been at the mercy of military plotters, socialists, land-owning elites and establishment republicans - all of whom have sought to steeer the republican institutions towards their own goals. As if that weren't enough anarchists and far-right activists alike have engaged in open and violent conflict. The central authority, or what's left of it, has steadily lost its grip on the levers of power.\n\nThe situation is dire and it will take a miracle for Spanish republicanism to endure...or perhaps it is time for the republic to be finally laid to rest."

